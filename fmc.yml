# Build & push web/API images to AWS ECR, then redeploy ECS.
#
# Two environments, selected by branch:
#   - main   → TEST
#   - master → PROD
#
# Required GitHub secrets (use the *_TEST / *_PROD suffix per environment).
# Shared:
#   secrets.AWS_ACCESS_KEY_ID
#   secrets.AWS_SECRET_ACCESS_KEY
#   vars.AWS_REGION  or  secrets.AWS_REGION
#
# Per-environment (replace SUFFIX with TEST or PROD):
#   secrets.VITE_API_URL_AWS_<SUFFIX>
#   secrets.VITE_API_ANON_KEY_<SUFFIX>
#   secrets.ECS_CLUSTER_<SUFFIX>
#   secrets.ECS_SERVICE_<SUFFIX>          (single-service deploys)
#   secrets.ECS_WEB_SERVICE_<SUFFIX>      (split-service deploys)
#   secrets.ECS_API_SERVICE_<SUFFIX>      (split-service deploys)
#
# Shared ECR repos: mdportal (web) and mdportal-mw (API).
# Image tags include the environment so test/prod don't collide:
#   <env>-latest, <env>-<git-sha>
 
name: Build and push to AWS ECR
 
on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment (overrides branch detection)"
        required: false
        type: choice
        options:
          - test
          - prod
 
permissions:
  contents: read
 
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
 
      - name: Resolve target environment
        id: env
        run: |
          if [ -n "${{ inputs.environment }}" ]; then
            ENV_NAME="${{ inputs.environment }}"
          elif [ "${{ github.ref }}" = "refs/heads/master" ]; then
            ENV_NAME="prod"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV_NAME="test"
          else
            echo "Branch ${{ github.ref }} is not deployable" >&2
            exit 1
          fi
          echo "env_name=$ENV_NAME" >> "$GITHUB_OUTPUT"
          echo "Deploying to: $ENV_NAME"
 
      - name: Resolve env-specific secrets
        id: vars
        env:
          ENV_NAME: ${{ steps.env.outputs.env_name }}
          AWS_REGION_VAR: ${{ vars.AWS_REGION }}
          AWS_REGION_SECRET: ${{ secrets.AWS_REGION }}
          VITE_API_URL_AWS_TEST: ${{ secrets.VITE_API_URL_AWS_TEST }}
          VITE_API_URL_AWS_PROD: ${{ secrets.VITE_API_URL_AWS_PROD }}
          VITE_API_ANON_KEY_TEST: ${{ secrets.VITE_API_ANON_KEY_TEST }}
          VITE_API_ANON_KEY_PROD: ${{ secrets.VITE_API_ANON_KEY_PROD }}
          ECS_CLUSTER_TEST: ${{ secrets.ECS_CLUSTER_TEST }}
          ECS_CLUSTER_PROD: ${{ secrets.ECS_CLUSTER_PROD }}
          ECS_SERVICE_TEST: ${{ secrets.ECS_SERVICE_TEST }}
          ECS_SERVICE_PROD: ${{ secrets.ECS_SERVICE_PROD }}
          ECS_WEB_SERVICE_TEST: ${{ secrets.ECS_WEB_SERVICE_TEST }}
          ECS_WEB_SERVICE_PROD: ${{ secrets.ECS_WEB_SERVICE_PROD }}
          ECS_API_SERVICE_TEST: ${{ secrets.ECS_API_SERVICE_TEST }}
          ECS_API_SERVICE_PROD: ${{ secrets.ECS_API_SERVICE_PROD }}
        run: |
          set -e
          UP=$(echo "$ENV_NAME" | tr '[:lower:]' '[:upper:]')
          pick() {
            VAR_NAME="${1}_${UP}"
            VALUE=$(printenv "$VAR_NAME" || true)
            echo "$VALUE"
          }
          REGION="${AWS_REGION_VAR:-$AWS_REGION_SECRET}"
          if [ -z "$REGION" ]; then
            echo "AWS_REGION must be set as a repo variable or secret" >&2
            exit 1
          fi
          {
            echo "aws_region=$REGION"
            echo "vite_api_url=$(pick VITE_API_URL_AWS)"
            echo "ecs_cluster=$(pick ECS_CLUSTER)"
            echo "ecs_service=$(pick ECS_SERVICE)"
            echo "ecs_web_service=$(pick ECS_WEB_SERVICE)"
            echo "ecs_api_service=$(pick ECS_API_SERVICE)"
          } >> "$GITHUB_OUTPUT"
          # Mask + emit secrets without printing them.
          ANON=$(pick VITE_API_ANON_KEY)
          echo "::add-mask::$ANON"
          echo "vite_api_anon_key=$ANON" >> "$GITHUB_OUTPUT"
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.vars.outputs.aws_region }}
 
      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2
 
      - uses: docker/setup-buildx-action@v4
 
      - name: Build and push web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/client.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/mdportal:${{ steps.env.outputs.env_name }}-latest
            ${{ steps.ecr-login.outputs.registry }}/mdportal:${{ steps.env.outputs.env_name }}-${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ steps.vars.outputs.vite_api_url }}
            VITE_API_ANON_KEY=${{ steps.vars.outputs.vite_api_anon_key }}
 
      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/server.Dockerfile
          push: true
          tags: |
            ${{ steps.ecr-login.outputs.registry }}/mdportal-mw:${{ steps.env.outputs.env_name }}-latest
            ${{ steps.ecr-login.outputs.registry }}/mdportal-mw:${{ steps.env.outputs.env_name }}-${{ github.sha }}
 
      - name: Prune old ECR images for this environment
        env:
          ENV_NAME: ${{ steps.env.outputs.env_name }}
          IMAGE_SHA: ${{ github.sha }}
          AWS_REGION: ${{ steps.vars.outputs.aws_region }}
        run: |
          set -euo pipefail
          KEEP_SHA_TAG="${ENV_NAME}-${IMAGE_SHA}"
          KEEP_LATEST_TAG="${ENV_NAME}-latest"
 
          prune_repo() {
            local REPO="$1"
            echo "Pruning $REPO (keeping ${KEEP_SHA_TAG} and ${KEEP_LATEST_TAG})..."
 
            # Tagged images for this env that are NOT the two we want to keep.
            local IDS_TO_DELETE
            IDS_TO_DELETE=$(aws ecr list-images \
              --repository-name "$REPO" \
              --region "$AWS_REGION" \
              --filter tagStatus=TAGGED \
              --query "imageIds[?starts_with(imageTag, \`${ENV_NAME}-\`) && imageTag != \`${KEEP_SHA_TAG}\` && imageTag != \`${KEEP_LATEST_TAG}\`]" \
              --output json)
 
            if [ "$(echo "$IDS_TO_DELETE" | jq 'length')" -gt 0 ]; then
              echo "$IDS_TO_DELETE" | jq -c '.[]' | while read -r ID; do
                aws ecr batch-delete-image \
                  --repository-name "$REPO" \
                  --region "$AWS_REGION" \
                  --image-ids "$ID" >/dev/null
              done
              echo "Deleted $(echo "$IDS_TO_DELETE" | jq 'length') tagged image(s) from $REPO."
            else
              echo "No old tagged ${ENV_NAME}-* images to delete in $REPO."
            fi
 
            # Untagged orphans (e.g. layers replaced when ${KEEP_LATEST_TAG} was retagged).
            local UNTAGGED
            UNTAGGED=$(aws ecr list-images \
              --repository-name "$REPO" \
              --region "$AWS_REGION" \
              --filter tagStatus=UNTAGGED \
              --query 'imageIds[*]' \
              --output json)
 
            if [ "$(echo "$UNTAGGED" | jq 'length')" -gt 0 ]; then
              aws ecr batch-delete-image \
                --repository-name "$REPO" \
                --region "$AWS_REGION" \
                --image-ids "$UNTAGGED" >/dev/null
              echo "Deleted $(echo "$UNTAGGED" | jq 'length') untagged image(s) from $REPO."
            fi
          }
 
          prune_repo mdportal
          prune_repo mdportal-mw
 
      - name: Trigger ECS service redeploy (single)
        if: ${{ steps.vars.outputs.ecs_cluster != '' && steps.vars.outputs.ecs_service != '' }}
        run: |
          aws ecs update-service \
            --cluster "${{ steps.vars.outputs.ecs_cluster }}" \
            --service "${{ steps.vars.outputs.ecs_service }}" \
            --force-new-deployment
 
      - name: Trigger ECS web service redeploy
        if: ${{ steps.vars.outputs.ecs_cluster != '' && steps.vars.outputs.ecs_web_service != '' }}
        run: |
          aws ecs update-service \
            --cluster "${{ steps.vars.outputs.ecs_cluster }}" \
            --service "${{ steps.vars.outputs.ecs_web_service }}" \
            --force-new-deployment
 
      - name: Trigger ECS API service redeploy
        if: ${{ steps.vars.outputs.ecs_cluster != '' && steps.vars.outputs.ecs_api_service != '' }}
        run: |
          aws ecs update-service \
            --cluster "${{ steps.vars.outputs.ecs_cluster }}" \
            --service "${{ steps.vars.outputs.ecs_api_service }}" \
            --force-new-deployment